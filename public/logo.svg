<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120" role="img" aria-label="Mi Voto Cuenta">
  <title>Mi Voto Cuenta</title>

  <!-- Globe icon: blue circle -->
  <circle cx="58" cy="52" r="38" fill="#003DA5"/>

  <!-- Globe: simplified white latitude/longitude lines -->
  <!-- Horizontal bands -->
  <path d="M22,44 Q58,36 94,44" fill="none" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <path d="M20,52 Q58,44 96,52" fill="none" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <path d="M22,60 Q58,68 94,60" fill="none" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <!-- Vertical center line -->
  <path d="M58,14 Q58,52 58,90" fill="none" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <!-- White continent blobs -->
  <ellipse cx="46" cy="46" rx="9" ry="7" fill="white" opacity="0.85" transform="rotate(-10 46 46)"/>
  <ellipse cx="68" cy="55" rx="7" ry="6" fill="white" opacity="0.85" transform="rotate(8 68 55)"/>
  <ellipse cx="52" cy="62" rx="5" ry="4" fill="white" opacity="0.85"/>

  <!-- Checkmark/voting card icon inside globe (bottom-right overlap) -->
  <rect x="74" y="62" width="26" height="26" rx="4" fill="white" stroke="#003DA5" stroke-width="1.5"/>
  <!-- Venezuelan flag colors checkmark -->
  <polyline points="78,76 82,82 95,70" fill="none" stroke="#FFD200" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="78,76 82,82 95,70" fill="none" stroke="#003DA5" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

  <!-- Text group: MI VOTO CUENTA -->
  <!-- "MI" -->
  <text x="112" y="48" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#1a1a1a" letter-spacing="1">MI</text>

  <!-- "V" replaced by a mini checkbox -->
  <!-- Checkbox rectangle -->
  <rect x="112" y="58" width="18" height="18" rx="3" fill="#FFD200"/>
  <polyline points="115,67 119,73 127,62" fill="none" stroke="#003DA5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "OTO" after the checkbox -->
  <text x="133" y="74" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#1a1a1a" letter-spacing="1">OTO</text>

  <!-- "CUENTA" on the same line as VOTO, shifted right after OTO -->
  <!-- We'll put VOTO and CUENTA on the same baseline but need room -->
  <!-- Actually layout: line 1 = "MI", line 2 = "[checkbox]OTO CUENTA" — fits in viewBox -->
  <text x="200" y="74" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#1a1a1a" letter-spacing="1">CUENTA</text>

  <!-- Venezuelan flag stripe at the bottom -->
  <!-- Yellow band -->
  <rect x="0" y="108" width="134" height="12" fill="#FFD200"/>
  <!-- Blue band with small white stars -->
  <rect x="134" y="108" width="132" height="12" fill="#003DA5"/>
  <!-- 7 tiny white stars on the blue band -->
  <circle cx="148" cy="114" r="1.8" fill="white"/>
  <circle cx="163" cy="114" r="1.8" fill="white"/>
  <circle cx="178" cy="114" r="1.8" fill="white"/>
  <circle cx="193" cy="114" r="1.8" fill="white"/>
  <circle cx="208" cy="114" r="1.8" fill="white"/>
  <circle cx="223" cy="114" r="1.8" fill="white"/>
  <circle cx="238" cy="114" r="1.8" fill="white"/>
  <circle cx="253" cy="114" r="1.8" fill="white"/>
  <!-- Red band -->
  <rect x="266" y="108" width="134" height="12" fill="#CF142B"/>
</svg>

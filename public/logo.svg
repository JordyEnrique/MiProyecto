<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120" role="img" aria-label="Mi Voto Cuenta">
  <title>Mi Voto Cuenta</title>

  <!-- Globe icon: blue circle background -->
  <circle cx="60" cy="56" r="42" fill="#003DA5"/>

  <!-- Globe: simplified latitude lines -->
  <path d="M20,45 Q60,35 100,45" fill="none" stroke="white" stroke-width="1.2" opacity="0.45"/>
  <path d="M18,56 Q60,46 102,56" fill="none" stroke="white" stroke-width="1.2" opacity="0.45"/>
  <path d="M20,67 Q60,77 100,67" fill="none" stroke="white" stroke-width="1.2" opacity="0.45"/>

  <!-- Globe: vertical center meridian -->
  <line x1="60" y1="14" x2="60" y2="98" stroke="white" stroke-width="1.2" opacity="0.45"/>
  <path d="M42,16 Q30,56 42,96" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <path d="M78,16 Q90,56 78,96" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>

  <!-- White continent blobs -->
  <ellipse cx="48" cy="44" rx="10" ry="7" fill="white" opacity="0.88" transform="rotate(-12 48 44)"/>
  <ellipse cx="72" cy="58" rx="8" ry="6" fill="white" opacity="0.88" transform="rotate(8 72 58)"/>
  <ellipse cx="52" cy="67" rx="6" ry="4.5" fill="white" opacity="0.88"/>
  <ellipse cx="40" cy="65" rx="4" ry="3" fill="white" opacity="0.7" transform="rotate(-5 40 65)"/>

  <!-- Voting checkmark badge overlapping globe bottom-right -->
  <rect x="78" y="68" width="28" height="28" rx="5" fill="white" stroke="#003DA5" stroke-width="1.5"/>
  <rect x="80" y="70" width="24" height="24" rx="4" fill="#FFD200"/>
  <polyline points="84,82 88,88 101,75" fill="none" stroke="#003DA5" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="84" cy="82" r="1.8" fill="#CF142B"/>

  <!-- TEXT: MI -->
  <text x="120" y="46" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="24" fill="#111111" letter-spacing="2">MI</text>

  <!-- Checkbox replacing the V in VOTO -->
  <rect x="120" y="55" width="22" height="22" rx="4" fill="#FFD200"/>
  <polyline points="124,66 128,72 138,60" fill="none" stroke="#003DA5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="124" cy="66" r="1.5" fill="#CF142B"/>

  <!-- OTO after checkbox -->
  <text x="145" y="76" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="24" fill="#111111" letter-spacing="2">OTO</text>

  <!-- CUENTA on same line -->
  <text x="220" y="76" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="24" fill="#111111" letter-spacing="2">CUENTA</text>

  <!-- Subtitle -->
  <text x="120" y="94" font-family="Arial, sans-serif" font-size="10" fill="#555555" letter-spacing="1.5">DIASPORA VENEZOLANA</text>

  <!-- Venezuelan flag stripe at bottom -->
  <rect x="0" y="108" width="140" height="12" fill="#FFD200"/>
  <rect x="140" y="108" width="140" height="12" fill="#003DA5"/>
  <circle cx="154" cy="114" r="2" fill="white"/>
  <circle cx="171" cy="114" r="2" fill="white"/>
  <circle cx="188" cy="114" r="2" fill="white"/>
  <circle cx="205" cy="114" r="2" fill="white"/>
  <circle cx="222" cy="114" r="2" fill="white"/>
  <circle cx="239" cy="114" r="2" fill="white"/>
  <circle cx="256" cy="114" r="2" fill="white"/>
  <circle cx="273" cy="114" r="2" fill="white"/>
  <rect x="280" y="108" width="140" height="12" fill="#CF142B"/>
</svg>

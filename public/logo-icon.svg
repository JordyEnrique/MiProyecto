<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Mi Voto Cuenta">
  <title>Mi Voto Cuenta</title>

  <!-- Globe: blue circle -->
  <circle cx="32" cy="32" r="30" fill="#003DA5"/>

  <!-- Globe: latitude lines -->
  <path d="M4,32 Q32,22 60,32" fill="none" stroke="white" stroke-width="1" opacity="0.45"/>
  <path d="M4,32 Q32,42 60,32" fill="none" stroke="white" stroke-width="1" opacity="0.45"/>

  <!-- Globe: vertical meridian -->
  <line x1="32" y1="2" x2="32" y2="62" stroke="white" stroke-width="1" opacity="0.45"/>
  <!-- Second curved meridians -->
  <path d="M20,4 Q10,32 20,60" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <path d="M44,4 Q54,32 44,60" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>

  <!-- White continent blobs -->
  <ellipse cx="22" cy="26" rx="7" ry="5.5" fill="white" opacity="0.88" transform="rotate(-12 22 26)"/>
  <ellipse cx="40" cy="35" rx="6" ry="5" fill="white" opacity="0.88" transform="rotate(8 40 35)"/>
  <ellipse cx="26" cy="40" rx="4" ry="3" fill="white" opacity="0.75"/>

  <!-- Voting checkmark badge in Venezuelan colors (bottom-right) -->
  <rect x="36" y="38" width="24" height="24" rx="5" fill="white" stroke="#003DA5" stroke-width="1.2"/>
  <rect x="38" y="40" width="20" height="20" rx="4" fill="#FFD200"/>
  <!-- Blue checkmark -->
  <polyline points="41,50 45,56 58,43" fill="none" stroke="#003DA5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Red accent dot -->
  <circle cx="41" cy="50" r="1.8" fill="#CF142B"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Mi Voto Cuenta icon">
  <title>Mi Voto Cuenta</title>

  <!-- Globe: blue circle -->
  <circle cx="32" cy="32" r="30" fill="#003DA5"/>

  <!-- Simplified globe lines -->
  <path d="M4,32 Q32,22 60,32" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <path d="M4,32 Q32,42 60,32" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="2" x2="32" y2="62" stroke="white" stroke-width="1" opacity="0.4"/>

  <!-- White continent shapes -->
  <ellipse cx="22" cy="26" rx="7" ry="5" fill="white" opacity="0.8" transform="rotate(-10 22 26)"/>
  <ellipse cx="40" cy="35" rx="6" ry="5" fill="white" opacity="0.8"/>

  <!-- Checkmark badge (bottom-right) in Venezuelan flag colors -->
  <rect x="36" y="38" width="22" height="22" rx="4" fill="white" stroke="#003DA5" stroke-width="1.2"/>
  <!-- Yellow background fill -->
  <rect x="37.5" y="39.5" width="19" height="19" rx="3" fill="#FFD200"/>
  <!-- Blue checkmark -->
  <polyline points="40,49 44,55 56,43" fill="none" stroke="#003DA5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Red accent dot -->
  <circle cx="40" cy="49" r="1.5" fill="#CF142B"/>
</svg>
